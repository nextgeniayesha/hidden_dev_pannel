name: hidden_dev_pannel
description: >-
  In-app developer panel with HTTP/API inspection, structured logs, and hooks
  for custom tabs — no third-party inspector packages required.
version: 0.1.2
repository: https://github.com/nextgeniayesha/hidden_dev_pannel

topics:
  - flutter
  - http
  - logging
  - network
  - widget

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0
  graphql: ^5.1.3
  gql: ^1.0.0
  share_plus: ^11.0.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
